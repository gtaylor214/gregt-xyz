<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>sailing · asset-free preview</title>
<style>
  :root{--ink:#e7dcc8;--ink-dim:#9b8f78;--sage:#9caa8a;--rust:#c2643c;--panel:#191613cc;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;background:#0d0c0b;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;}
  #gl{display:block;width:100vw;height:100vh;position:fixed;inset:0;}
  .card{position:fixed;background:var(--panel);color:var(--ink);border:1px solid #ffffff14;
    border-radius:10px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:5;}
  #hud{bottom:14px;left:14px;padding:11px 14px;min-width:170px;}
  #hud .row{display:flex;justify-content:space-between;gap:18px;font:12px/1.7 ui-monospace,monospace;}
  #hud .row span:first-child{color:var(--ink-dim);}
  #hud .row span:last-child{color:var(--ink);}
  #help{bottom:14px;right:14px;padding:10px 13px;font:11px/1.6 ui-monospace,monospace;color:var(--ink-dim);text-align:right;}
  #help b{color:var(--ink);}
  #perf{top:14px;right:14px;padding:11px 14px;min-width:152px;}
  #perf .row{display:flex;justify-content:space-between;gap:18px;font:12px/1.7 ui-monospace,monospace;}
  #perf .row span:first-child{color:var(--ink-dim);}
  #perf .row span:last-child{color:var(--ink);}
  #wind{top:14px;left:14px;padding:9px 12px 7px;display:flex;flex-direction:column;align-items:center;}
  #wind .wl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--sage);margin-bottom:3px;}
  #wind .ws{font:11px/1 ui-monospace,monospace;color:var(--ink);margin-top:3px;}
  #windsvg{cursor:grab;touch-action:none;}
  #windsvg:active{cursor:grabbing;}
  #wind input[type=range]{-webkit-appearance:none;appearance:none;width:78px;height:3px;background:#3a342d;border-radius:3px;margin-top:9px;outline:none;}
  #wind input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--ink);border:2px solid #191613;cursor:pointer;}
  #wind input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--ink);border:none;cursor:pointer;}
  #wind .wh{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);margin-top:6px;}
  #touchctl{display:none;}
  body.touch #touchctl{display:flex;justify-content:space-between;position:fixed;left:0;right:0;bottom:0;padding:16px;z-index:6;pointer-events:none;}
  #touchctl .pad{display:flex;gap:14px;pointer-events:auto;}
  .tbtn{width:60px;height:60px;border-radius:50%;background:var(--panel);color:var(--ink);border:1px solid #ffffff22;
    font-size:20px;line-height:1;display:grid;place-items:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
  .tbtn:active{background:var(--rust);color:#191613;}
  body.touch #hud{bottom:90px;}
  #fail{position:fixed;inset:0;display:none;place-items:center;text-align:center;color:#e7dcc8;font-size:15px;padding:2rem;background:#0d0c0b;z-index:20;}
  @media (max-width:760px){ #help{display:none;} #hud{min-width:0;} }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="wind" class="card">
  <div class="wl">wind</div>
  <svg id="windsvg" viewBox="-50 -50 100 100" width="64" height="64">
    <circle cx="0" cy="0" r="50" fill="transparent"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="#ffffff20" stroke-width="2"/>
    <polygon points="0,-47 -5,-39 5,-39" fill="#9caa8a"/>
    <g id="w-arrow">
      <line x1="0" y1="0" x2="0" y2="-30" stroke="#c2643c" stroke-width="4"/>
      <polygon points="0,-40 -7,-27 7,-27" fill="#c2643c"/>
    </g>
  </svg>
  <input id="w-speed" type="range" min="0.2" max="3" step="0.1" value="1">
  <div class="ws"><span id="w-spd">1.0</span> kn</div>
  <div class="wh">drag dial &middot; slider = speed</div>
</div>
<div id="hud" class="card">
  <div class="row"><span>speed</span><span id="h-speed">0.0</span></div>
  <div class="row"><span>point of sail</span><span id="h-pos">–</span></div>
  <div class="row"><span>sail power</span><span id="h-power">60%</span></div>
</div>
<div id="perf" class="card">
  <div class="row"><span>fps</span><span id="h-fps">–</span></div>
  <div class="row"><span>frame</span><span id="h-ms">–</span></div>
  <div class="row"><span>triangles</span><span id="h-tris">–</span></div>
  <div class="row"><span>draw calls</span><span id="h-draws">–</span></div>
  <div class="row"><span>verts (gen)</span><span id="h-verts" style="color:#7fcf9a">–</span></div>
</div>
<div id="help" class="card"><b>W/S</b> sail power &nbsp; <b>A/D</b> steer<br>(or arrow keys)</div>
<div id="touchctl">
  <div class="pad left">
    <button id="t-left" class="tbtn">&#9664;</button>
    <button id="t-right" class="tbtn">&#9654;</button>
  </div>
  <div class="pad right">
    <button id="t-down" class="tbtn">&#9660;</button>
    <button id="t-up" class="tbtn">&#9650;</button>
  </div>
</div>
<div id="fail">This needs WebGL2.<br>Try the latest Chrome, Edge, Firefox, or Safari.</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
